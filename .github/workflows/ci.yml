# CI/CD pipeline фронта Show Ring (GitHub Actions).
#
# Стадии: lint → typecheck → test → deploy.
# - lint/typecheck/test — на каждый push и PR (облачные раннеры).
# - deploy — только push в main, на self-hosted runner'е (на прод-сервере).
#   Реестр (ghcr) НЕ используется: образ web собирается ЛОКАЛЬНО на сервере
#   из этого репо (build: ../show-ring-frontend в compose бэка). Раннер
#   просто запускает общий deploy.sh бэкенда — тот тянет ОБА репо и
#   пересобирает стек.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: "22"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: [lint, typecheck, test]
    if: github.ref == 'refs/heads/main'
    # Тот же self-hosted runner на прод-сервере, что и у бэка (метка show-ring),
    # но зарегистрированный в ЭТОМ репозитории (раннер привязан к одному репо).
    # Деплой против рабочих копий в /opt — checkout не нужен. deploy.sh лежит
    # в бэкенд-репо и тянет оба репо; путь — под реальную раскладку сервера.
    runs-on: [self-hosted, show-ring]
    steps:
      - name: Pull repos & rebuild stack
        run: bash /opt/show-ring-backend/deploy/deploy.sh
